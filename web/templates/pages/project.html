{{define "content"}}
<div class="page-head">
  <nav class="crumbs" aria-label="Breadcrumb">
    <a href="/" hx-get="/" hx-target="#main" hx-push-url="true">Projects</a>
    <span class="sep">/</span><span class="crumb current">{{.Project.Name}}</span>
  </nav>
  <button class="btn primary" type="button" hx-get="/projects/{{.Project.ID}}/new-env" hx-target="#dialog">{{template "icon" "plus"}} Environment</button>
</div>
<ul class="tree" id="tree">{{range .Envs}}{{template "envNode" .}}{{end}}</ul>
<p class="empty tree-empty">No environments yet - add one (e.g. development, staging, production) to start.</p>
{{end}}
