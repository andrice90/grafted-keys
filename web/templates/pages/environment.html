{{define "content"}}
<nav class="crumbs" aria-label="Breadcrumb">
  <a href="/" hx-get="/" hx-target="#main" hx-push-url="true">Projects</a><span class="sep">/</span>
  <a href="/projects/{{.Project.ID}}" hx-get="/projects/{{.Project.ID}}" hx-target="#main" hx-push-url="true">{{.Project.Name}}</a><span class="sep">/</span>
  <span class="crumb current">{{.Environment.Name}}</span>
</nav>
<div class="grid-head">
  <h1>{{.Environment.Name}} <span class="pill env">env</span></h1>
  <button class="btn primary" type="button" data-open="#dlg-new-folder">+ Folder</button>
</div>
{{if .Folders}}
<ul class="grid cards" id="grid">{{range .Folders}}{{template "folderCard" .}}{{end}}</ul>
{{else}}
<p class="empty">No folders yet. Group secrets into categories like “API keys” or “Database”.</p>
{{end}}
<dialog id="dlg-new-folder" class="dialog">
  <form class="form" hx-post="/folders" hx-target="#main">
    <h2>New folder</h2>
    <input type="hidden" name="environment_id" value="{{.Environment.ID}}">
    <label>Name <input name="name" required autocomplete="off" autofocus></label>
    <menu class="form-actions"><button type="button" data-close>Cancel</button><button class="primary" type="submit">Create</button></menu>
  </form>
</dialog>
{{end}}
