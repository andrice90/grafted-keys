{{define "content"}}
<div class="page-head">
  <nav class="crumbs" aria-label="Breadcrumb"><span class="crumb current">Projects</span></nav>
  <button class="btn primary" type="button" data-open="#dlg-new-project">{{template "icon" "plus"}} Project</button>
</div>
<ul class="grid cards" id="grid">{{range .Projects}}{{template "projectCard" .}}{{end}}</ul>
<p class="empty grid-empty">No projects yet. Create your first one to start storing keys.</p>
<dialog id="dlg-new-project" class="dialog">
  <form class="form" hx-post="/projects" hx-target="#main">
    <h2>New project</h2>
    <label>Name <input name="name" required autocomplete="off" autofocus></label>
    <menu class="form-actions">
      <button class="btn" type="button" data-close>Cancel</button>
      <button class="btn primary" type="submit">Create</button>
    </menu>
  </form>
</dialog>
{{end}}
