services:
  grafted:
    build: { context: ., args: { VERSION: "0.1.0" } }
    image: grafted-secrets:latest
    container_name: grafted-secrets
    restart: unless-stopped
    ports:
      - "8080:8080"            # put a TLS-terminating reverse proxy in front
    environment:
      GRAFTED_ADDR: ":8080"
      GRAFTED_BACKUP_AT: "03:00"   # daily snapshot time (HH:MM, 24h)
      GRAFTED_BACKUP_KEEP: "14"    # retain newest N encrypted backups
      GRAFTED_SESSION_IDLE: "30m"  # auto-lock after inactivity
      GRAFTED_SECURE_COOKIE: "1"   # set 0 ONLY for plain-HTTP LAN without TLS
      GRAFTED_TRUST_PROXY: "0"     # set 1 when behind a trusted reverse proxy
    volumes:
      - data:/data
      - backups:/backups

    # --- hardening ---
    read_only: true
    user: "65532:65532"           # distroless 'nonroot'
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      # world-writable + sticky like a real /tmp, since the process runs as 65532
      - /tmp:size=64m,mode=1777
    mem_limit: 128m
    pids_limit: 64

volumes:
  data:
  backups:
